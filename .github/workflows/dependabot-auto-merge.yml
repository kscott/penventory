name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'kscott/penventory'
    steps:
      - name: Dependabot metadata
        id: metadata
        # Pinned by commit SHA (GitHub's own recommended practice for
        # third-party actions), behind the v3.1.0 tag as of 2026-07-09.
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
      # Only security-update PRs land in this repo (version updates aren't
      # configured — see ARCHITECTURE.md). Major bumps still wait for a human;
      # patch/minor merge on their own once the rest of CI is green.
      - name: Enable auto-merge for patch/minor
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
